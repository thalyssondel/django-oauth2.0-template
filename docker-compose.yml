version: '3.8'

services:
  db:
    image: postgres:15
    container_name: django_oauth_db
    environment:
      POSTGRES_DB: oauth_db
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: